<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | System Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-black: #000000;
            --color-white: #ffffff;
            --color-gray: #71717a;
            --input-bg: #ffffff;
            --border-alpha: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            /* MATCHING GRID PATTERN */
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--color-black);
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border: 1px solid var(--border-alpha);
            border-radius: 2px; /* Professional sharp corners */
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        /* Black Accent Line */
        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--color-black);
        }

        .header {
            margin-bottom: 30px;
            text-align: left;
        }

        .label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--color-gray);
            display: block;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            text-transform: uppercase;
        }

        /* Form Styling */
        .form-group {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Two columns for name/surname */
            gap: 12px;
            margin-bottom: 12px;
        }

        .full-width {
            grid-column: span 2;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--color-black);
            border-radius: 0; /* Sharp edges */
            font-size: 0.85rem;
            background: var(--input-bg);
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            background-color: #fcfcfc;
            box-shadow: 4px 4px 0px var(--color-black);
            transform: translate(-2px, -2px);
        }

        ::placeholder {
            color: #a1a1aa;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: var(--color-black);
            color: var(--color-white);
            border: 1px solid var(--color-black);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: transparent;
            color: var(--color-black);
        }

        .login-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--color-gray);
        }

        .login-footer a {
            color: var(--color-black);
            font-weight: 700;
            text-decoration: none;
            margin-left: 5px;
        }

        /* Mobile Adjustment */
        @media (max-width: 480px) {
            .form-group {
                grid-template-columns: 1fr;
            }
            .full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <span class="label">Entry Form</span>
            <h2>Create <br> Identity</h2>
        </div>

        <div class="form-group">
            <input id="name" placeholder="First Name">
            <input id="surname" placeholder="Last Name">
            
            <input id="email" type="email" placeholder="Email Address" class="full-width">
            <input id="prn" placeholder="Registration (PRN)" class="full-width">
            <input id="contact" type="tel" placeholder="Contact Number" class="full-width">
            <input id="password" type="password" placeholder="Access Password" class="full-width">
        </div>

        <button onclick="register()">Authorize Registration</button>

        <div class="login-footer">
            Already registered? <a href="login.html">Sign In →</a>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
