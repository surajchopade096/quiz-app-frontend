<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* Modern UI Style for Quiz */
        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px; /* Wider for comfortable reading */
            text-align: center;
        }

        #timer {
            font-size: 1.5rem;
            color: #d9534f; /* Red for urgency */
            background: #fdf2f2;
            padding: 8px 15px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 20px;
            font-weight: bold;
            border: 1px solid #f5c6cb;
        }

        #question {
            font-size: 1.25rem;
            color: #333;
            margin-bottom: 1.5rem;
            text-align: left;
            line-height: 1.5;
            min-height: 60px;
        }

        #options {
            text-align: left;
            margin-bottom: 2rem;
        }

        /* Styling for radio buttons/options generated by quiz.js */
        #options label {
            display: block;
            padding: 12px 15px;
            margin-bottom: 10px;
            background: #f9f9f9;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #options label:hover {
            background: #f0f7ff;
            border-color: #4A90E2;
        }

        /* Buttons Container */
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        /* Navigation Buttons */
        button[onclick="prev()"], button[onclick="next()"] {
            background-color: #6c757d;
            color: white;
        }

        button[onclick="prev()"]:hover, button[onclick="next()"]:hover {
            background-color: #5a6268;
        }

        /* Submit Button */
        button[onclick="submitQuiz()"] {
            background-color: #28a745;
            color: white;
        }

        button[onclick="submitQuiz()"]:hover {
            background-color: #218838;
        }

        button:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

<div class="container">
    <h3 id="timer">60:00</h3>
    <h4 id="question">Loading Question...</h4>

    <div id="options">
        </div>

    <div class="btn-group">
        <button onclick="prev()">Previous</button>
        <button onclick="next()">Next</button>
        <button onclick="submitQuiz()">Submit</button>
    </div>
</div>

<script>
document.addEventListener("keydown", function(e) {
    if (e.key === "F5" || (e.ctrlKey && e.key === "r")) {
        e.preventDefault();
        alert("Refresh is disabled during quiz!");
    }
});
</script>
<script>
history.pushState(null, null, location.href);
window.onpopstate = function () {
    history.go(1);
};
</script>
<script src="../js/protect.js"></script>
<script>if (typeof checkAuth === "function") checkAuth();</script>
<script src="../js/api.js"></script>
<script src="../js/quiz.js"></script>
</body>
</html>
