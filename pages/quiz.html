<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examination | Active Session</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-black: #000000;
            --color-white: #ffffff;
            --color-gray: #71717a;
            --color-light-gray: #f4f4f5;
            --border-alpha: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--color-black);
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border: 1px solid var(--border-alpha);
            border-radius: 2px;
            width: 100%;
            max-width: 700px; /* Wider for 50 questions */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        /* Top Progress Indicator */
        .progress-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--color-light-gray);
        }
        #progress-bar {
            height: 100%;
            width: 20%; /* Managed by JS */
            background: var(--color-black);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .meta-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--color-gray);
        }

        #timer {
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
        }

        #question {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.4;
            margin-bottom: 30px;
            min-height: 80px;
        }

        /* Options Grid */
        #options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 40px;
        }

        /* Style for the radio inputs & labels from your quiz.js */
        #options label {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border: 1px solid var(--color-black);
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        #options label:hover {
            background: var(--color-light-gray);
        }

        /* When an option is selected (you can toggle this class in quiz.js) */
        #options label.selected {
            background: var(--color-black);
            color: var(--color-white);
        }

        /* Hide actual radio buttons but keep them functional */
        #options input[type="radio"] {
            margin-right: 15px;
            accent-color: black;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--border-alpha);
            padding-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--color-black);
            background: transparent;
        }

        .btn-nav {
            background: var(--color-white);
            color: var(--color-black);
        }

        .btn-nav:hover {
            background: var(--color-light-gray);
        }

        .btn-submit {
            background: var(--color-black);
            color: var(--color-white);
        }

        .btn-submit:hover {
            opacity: 0.8;
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        @media (max-width: 600px) {
            .card { padding: 30px 20px; }
            #question { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div class="meta-info">
            <span id="timer">60:00</span>
        </div>

        <h2 id="question">Loading system environment...</h2>

        <div id="options">
            </div>

        <div class="btn-group">
            <button class="btn-nav" onclick="prev()">Previous</button>
            <button class="btn-nav" onclick="next()">Next</button>
            <button class="btn-submit" onclick="submitQuiz()">Submit Test</button>
        </div>
    </div>

    <script>
        // Disable Refresh
        document.addEventListener("keydown", function(e) {
            if (e.key === "F5" || (e.ctrlKey && e.key === "r")) {
                e.preventDefault();
            }
        });

        // Prevent Back Button
        history.pushState(null, null, location.href);
        window.onpopstate = function () { history.go(1); };
    </script>
    <script src="../js/protect.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/quiz.js"></script>
</body>
</html>
