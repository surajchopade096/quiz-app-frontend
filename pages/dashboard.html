<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selection | System Environment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-black: #000000;
            --color-white: #ffffff;
            --color-gray: #71717a;
            --border-alpha: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            /* MATCHING GRID PATTERN */
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--color-black);
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 50px 40px;
            border: 1px solid var(--border-alpha);
            border-radius: 2px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        /* Black Accent Line */
        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--color-black);
        }

        .header {
            margin-bottom: 35px;
        }

        .label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--color-gray);
            display: block;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            text-transform: uppercase;
            line-height: 1;
        }

        /* Modern Select Styling */
        .select-wrapper {
            position: relative;
            margin-bottom: 30px;
        }

        select {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--color-black);
            border-radius: 0;
            font-size: 0.9rem;
            font-weight: 500;
            background: var(--color-white);
            appearance: none; /* Removes default browser arrow */
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        /* Custom Arrow for the Select */
        .select-wrapper::after {
            content: '↓';
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8rem;
            pointer-events: none;
        }

        select:focus {
            background-color: #fcfcfc;
            box-shadow: 4px 4px 0px var(--color-black);
            transform: translate(-2px, -2px);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--color-black);
            color: var(--color-white);
            border: 1px solid var(--color-black);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: transparent;
            color: var(--color-black);
        }

        button:active {
            transform: scale(0.98);
        }

        .footer-note {
            margin-top: 25px;
            font-size: 0.65rem;
            text-align: center;
            color: var(--color-gray);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <span class="label">Step 02 / Configure</span>
            <h2>Select <br> Language</h2>
        </div>

        <div class="select-wrapper">
            <select id="language">
                <option value="Java">Java Environment</option>
                <option value="C">C Programming</option>
                <option value="Python">Python Scripting</option>
            </select>
        </div>

        <button onclick="startQuiz()">Initialize Test</button>

        <div class="footer-note">
            
        </div>
    </div>

    <script>
        function startQuiz() {
            const lang = document.getElementById("language").value;
            localStorage.setItem("language", lang);
            window.location.href = "quiz.html";
        }

        // Auth check logic remains same
        if (typeof checkAuth === "function") {
            checkAuth();
        }
    </script>
    <script src="../js/protect.js"></script>
</body>
</html>
