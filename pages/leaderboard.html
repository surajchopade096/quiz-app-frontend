<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* Unified Modern UI Style */
        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Start from top for long lists */
            min-height: 100vh;
            margin: 0;
            padding-top: 50px;
        }

        .container {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 450px; /* Slightly wider for scores */
        }

        h2 {
            color: #333;
            margin-bottom: 1.8rem;
            font-weight: 600;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        /* Leaderboard List Styling */
        #list {
            margin-top: 1rem;
            text-align: left;
        }

        /* Styling for items generated by leaderboard.js */
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 8px;
            background: #f9f9f9;
            border-radius: 8px;
            transition: transform 0.2s ease;
        }

        .leaderboard-item:hover {
            transform: translateX(5px);
            background: #f0f7ff;
        }

        .rank {
            font-weight: bold;
            color: #4A90E2;
            margin-right: 10px;
        }

        .name {
            flex-grow: 1;
            color: #555;
        }

        .score {
            font-weight: 600;
            color: #333;
            background: #e0e0e0;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        /* Highlight top 3 if you choose to use these classes in JS */
        .rank-1 { background: #fff9c4; border: 1px solid #fbc02d; }
    </style>
</head>
<body>

<div class="container">
    <h2>Leaderboard</h2>
    <div id="list">
        </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/leaderboard.js"></script>
</body>
</html>
