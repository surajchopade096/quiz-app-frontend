<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | System Rankings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-black: #000000;
            --color-white: #ffffff;
            --color-gray: #71717a;
            --color-light-gray: #f4f4f5;
            --border-alpha: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background-color: #ffffff;
            /* MATCHING GRID PATTERN */
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--color-black);
            padding: 60px 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border: 1px solid var(--border-alpha);
            border-radius: 2px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        /* Black Accent Line */
        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--color-black);
        }

        .header {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-alpha);
            padding-bottom: 20px;
        }

        .label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--color-gray);
            display: block;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            text-transform: uppercase;
        }

        /* Leaderboard Items Styling */
        #list {
            margin-top: 10px;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid var(--color-light-gray);
            transition: all 0.2s ease;
        }

        .leaderboard-item:hover {
            background: var(--color-light-gray);
            transform: scale(1.02);
        }

        .rank {
            font-weight: 800;
            font-size: 0.8rem;
            width: 35px;
            height: 35px;
            background: var(--color-black);
            color: var(--color-white);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            flex-shrink: 0;
        }

        .name {
            flex-grow: 1;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .score {
            font-weight: 800;
            font-size: 0.9rem;
            padding: 4px 12px;
            border: 1px solid var(--color-black);
        }

        /* Specialized Styling for Rank 1 */
        .leaderboard-item:first-child .rank {
            background: var(--color-black);
            outline: 3px solid var(--color-black);
            outline-offset: 2px;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
        }

        .btn-home {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--color-black);
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid var(--color-black);
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background: var(--color-black);
            color: var(--color-white);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <span class="label">Archive / Records</span>
            <h2>Leaderboard</h2>
        </div>

        <div id="list">
            </div>

        <div class="footer">
            <a href="../index.html" class="btn-home">Return to System Home</a>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/leaderboard.js"></script>
</body>
</html>
