<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* Unified Modern UI Style */
        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #ffffff;
            padding: 3rem 2rem;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 350px;
            border-top: 6px solid #4A90E2; /* Accent top border */
        }

        h2 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        #score {
            font-size: 2.5rem;
            font-weight: 800;
            color: #4A90E2;
            background: #f0f7ff;
            display: inline-block;
            padding: 15px 30px;
            border-radius: 50px;
            margin: 1.5rem 0;
            border: 2px dashed #4A90E2;
        }

        .action-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 1rem;
            background-color: #4A90E2;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .action-btn:hover {
            background-color: #357ABD;
        }

        /* Subtle animation for the score appearing */
        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .container {
            animation: popIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Quiz Completed!</h2>
    <div id="score">Score: 0</div>
    
    <a href="leaderboard.html" class="action-btn">View Leaderboard</a>
    <a href="language.html" class="action-btn" style="background-color: #6c757d;">Try Again</a>
</div>

<script>
    // Logic remains exactly as you had it
    const result = JSON.parse(localStorage.getItem("result"));
    if (result && result.score !== undefined) {
        document.getElementById("score").innerText = "Score: " + result.score;
    }
</script>

<script src="../js/protect.js"></script>
<script>
    if (typeof checkAuth === "function") {
        checkAuth();
    }
</script>

</body>
</html>
