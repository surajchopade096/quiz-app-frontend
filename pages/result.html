<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results | System Evaluation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-black: #000000;
            --color-white: #ffffff;
            --color-gray: #71717a;
            --border-alpha: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            /* MATCHING GRID PATTERN */
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--color-black);
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 60px 40px;
            border: 1px solid var(--border-alpha);
            border-radius: 2px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08);
            position: relative;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Black Accent Line */
        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--color-black);
        }

        .label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--color-gray);
            display: block;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .score-display {
            border: 2px solid var(--color-black);
            padding: 30px;
            margin-bottom: 40px;
            position: relative;
        }

        #score {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.05em;
        }

        .score-label {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            background: var(--color-black);
            color: var(--color-white);
            padding: 4px 10px;
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .action-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: var(--color-black);
            color: var(--color-white);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            border: 1px solid var(--color-black);
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: transparent;
            color: var(--color-black);
        }

        .home-link {
            display: inline-block;
            margin-top: 25px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--color-gray);
            text-decoration: none;
            transition: color 0.2s;
        }

        .home-link:hover {
            color: var(--color-black);
        }
    </style>
</head>
<body>

<div class="card">
    <span class="label">Session Terminated</span>
    <h2>Evaluation <br> Complete</h2>

    <div class="score-display">
        <div id="score">0</div>
        <span class="score-label">Marks Secured</span>
    </div>
    
    <a href="leaderboard.html" class="action-btn">View Leaderboard</a>
    <a href="../index.html" class="home-link">Return to Home →</a>
</div>

<script>
    const result = JSON.parse(localStorage.getItem("result"));
    if (result && result.score !== undefined) {
        document.getElementById("score").innerText = result.score;
    }
</script>

<script src="../js/protect.js"></script>
<script>
    if (typeof checkAuth === "function") {
        checkAuth();
    }
</script>

</body>
</html>
