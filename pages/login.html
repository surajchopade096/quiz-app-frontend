<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | System Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-black: #000000;
            --color-white: #ffffff;
            --color-gray: #71717a;
            --border-alpha: rgba(0, 0, 0, 0.1);
            --input-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            /* MATCHING GRID PATTERN */
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--color-black);
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 50px 40px;
            border: 1px solid var(--border-alpha);
            border-radius: 2px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        /* Black Accent Line */
        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--color-black);
        }

        .header {
            margin-bottom: 35px;
        }

        .label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--color-gray);
            display: block;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            text-transform: uppercase;
            line-height: 1;
        }

        .input-stack {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--color-black);
            border-radius: 0;
            font-size: 0.9rem;
            background: var(--input-bg);
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            background-color: #fcfcfc;
            box-shadow: 4px 4px 0px var(--color-black);
            transform: translate(-2px, -2px);
        }

        ::placeholder {
            color: #a1a1aa;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--color-black);
            color: var(--color-white);
            border: 1px solid var(--color-black);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: transparent;
            color: var(--color-black);
        }

        .footer-links {
            margin-top: 30px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--color-gray);
        }

        .footer-links a {
            color: var(--color-black);
            font-weight: 700;
            text-decoration: none;
            margin-left: 5px;
            transition: opacity 0.2s;
        }

        .footer-links a:hover {
            opacity: 0.7;
        }

    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <span class="label">Access Protocol</span>
            <h2>Sign <br> In</h2>
        </div>

        <div class="input-stack">
            <input id="email" type="text" placeholder="Email or PRN">
            <input id="password" type="password" placeholder="Access Password">
        </div>

        <button onclick="login()">Verify Identity</button>

        <div class="footer-links">
            New user? <a href="register.html">Create Identity →</a>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
